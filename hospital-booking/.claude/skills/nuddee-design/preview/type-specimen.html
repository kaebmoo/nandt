<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Type — Sarabun specimen</title>
<link rel="stylesheet" href="preview.css">
<style>
  body { padding: 18px 24px; }
  .specimen { font-family: 'Sarabun', sans-serif; color: #111827; line-height: 1.15; }
  .display { font-size: 80px; font-weight: 700; letter-spacing: -0.02em; }
  .sub { display: flex; align-items: baseline; gap: 14px; margin-top: 6px; color: #6b7280; font-size: 13px; }
  .sub b { color: #111827; font-weight: 600; font-size: 14px; }
  .weights { display: flex; gap: 22px; margin-top: 18px; font-size: 22px; color: #111827; align-items: baseline; }
  .weights div { display: flex; flex-direction: column; gap: 2px; }
  .weights span { font-size: 11px; color: #6b7280; font-weight: 400; letter-spacing: 0.04em; text-transform: uppercase; }
  .thai { font-size: 16px; color: #4b5563; margin-top: 14px; line-height: 1.5; }
</style>
</head>
<body>
  <div class="specimen">
    <div class="display">NudDee นัดดี</div>
    <div class="sub"><b>Sarabun</b><span>Thai + Latin · variable weights · Google Fonts · used everywhere in the product</span></div>

    <div class="weights">
      <div style="font-weight:300;">Aa กข<span>300 Light</span></div>
      <div style="font-weight:400;">Aa กข<span>400 Regular</span></div>
      <div style="font-weight:600;">Aa กข<span>600 SemiBold</span></div>
      <div style="font-weight:700;">Aa กข<span>700 Bold</span></div>
    </div>

    <div class="thai">จองนัดหมายออนไลน์ — เลือกวัน เลือกเวลา ยืนยัน<br>The quick brown fox jumps over the lazy dog · 0123456789 · ฿1,990/เดือน</div>
  </div>
</body>
</html>
