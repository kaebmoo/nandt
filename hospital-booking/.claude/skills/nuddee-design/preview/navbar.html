<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Nav bar</title>
<link rel="stylesheet" href="preview.css">
<style>
  body { padding: 0; background: #f9fafb; font-family: 'Sarabun', sans-serif; width: 700px; }
  nav { background: #fff; box-shadow: 0 1px 2px rgba(0,0,0,.05); border-bottom: 1px solid #e5e7eb; padding: 14px 24px; display: flex; justify-content: space-between; align-items: center; }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand b { font-size: 20px; font-weight: 700; color: #111827; }
  .right { display: flex; align-items: center; gap: 16px; }
  .hosp { font-size: 13px; color: #6b7280; }
  .user { display: flex; align-items: center; gap: 8px; }
  .avatar { width: 32px; height: 32px; border-radius: 50%; background: #f3e8ff; color: #9333ea; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 14px; }
  .uname { font-size: 14px; font-weight: 500; color: #374151; }
  svg.bolt { width: 32px; height: 32px; color: #9333ea; }
  svg.chev { width: 16px; height: 16px; color: #6b7280; }
</style>
</head>
<body>
  <nav>
    <div class="brand">
      <svg class="bolt" fill="currentColor" viewBox="0 0 20 20"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"/></svg>
      <b>NudDee</b>
    </div>
    <div class="right">
      <span class="hosp">โรงพยาบาลหำน้อย</span>
      <div class="user">
        <div class="avatar">ส</div>
        <span class="uname">นพ. สมชาย ใจดี</span>
        <svg class="chev" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
      </div>
    </div>
  </nav>
</body>
</html>
