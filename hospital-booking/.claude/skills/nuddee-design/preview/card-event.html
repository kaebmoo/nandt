<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Card</title>
<link rel="stylesheet" href="preview.css">
<style>
  body { padding: 18px 24px; background: #f9fafb; font-family: 'Sarabun', sans-serif; }
  .card { background: #fff; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,.1),0 2px 4px -2px rgba(0,0,0,.1); padding: 20px; }
  .bar { height: 8px; border-radius: 999px; background: #6366f1; margin-bottom: 14px; width: 42%; }
  .title { font-size: 18px; font-weight: 600; color: #1f2937; margin-bottom: 4px; }
  .desc { font-size: 13px; color: #4b5563; margin-bottom: 14px; line-height: 1.5; }
  .meta { display: flex; gap: 18px; font-size: 13px; color: #6b7280; margin-bottom: 18px; }
  .meta span { display: inline-flex; align-items: center; gap: 6px; }
  .btn { width: 100%; padding: 10px; border-radius: 8px; background: linear-gradient(to right,#9333ea,#2563eb); color: #fff; border: 0; font-family: inherit; font-size: 14px; font-weight: 500; cursor: pointer; }
  svg { width: 14px; height: 14px; stroke-width: 2; }
</style>
</head>
<body>
  <div class="card">
    <div class="bar"></div>
    <div class="title">ปรึกษาแพทย์ทั่วไป</div>
    <div class="desc">ตรวจร่างกาย ประเมินอาการ และวินิจฉัยโรคเบื้องต้นโดยแพทย์เวชปฏิบัติทั่วไป</div>
    <div class="meta">
      <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>30 นาที</span>
      <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>จองล่วงหน้า 30 วัน</span>
    </div>
    <button class="btn">เลือกและดูเวลาว่าง</button>
  </div>
</body>
</html>
