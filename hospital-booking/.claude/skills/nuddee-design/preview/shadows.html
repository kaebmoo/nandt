<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Shadow scale</title>
<link rel="stylesheet" href="preview.css">
<style>
  body { padding: 26px 24px; background: #f9fafb; }
  .row { display: flex; gap: 20px; align-items: flex-start; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; flex: 1; }
  .box { width: 100%; height: 72px; background: #fff; border-radius: 12px; }
  .tok { font-size: 12px; font-weight: 600; color: #111827; font-family: ui-monospace, Menlo, monospace; }
  .use { font-size: 11px; color: #6b7280; text-align: center; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="box-shadow:0 1px 2px 0 rgba(0,0,0,0.05);"></div><span class="tok">shadow-sm</span><span class="use">sticky nav</span></div>
    <div class="item"><div class="box" style="box-shadow:0 4px 6px -1px rgba(0,0,0,0.1),0 2px 4px -2px rgba(0,0,0,0.1);"></div><span class="tok">shadow-md</span><span class="use">cards · default</span></div>
    <div class="item"><div class="box" style="box-shadow:0 10px 15px -3px rgba(0,0,0,0.1),0 4px 6px -4px rgba(0,0,0,0.1);"></div><span class="tok">shadow-lg</span><span class="use">pricing · modal</span></div>
    <div class="item"><div class="box" style="box-shadow:0 20px 25px -5px rgba(0,0,0,0.1),0 8px 10px -6px rgba(0,0,0,0.1);"></div><span class="tok">shadow-xl</span><span class="use">hover · emphasis</span></div>
  </div>
</body>
</html>
