<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Neutrals</title>
<link rel="stylesheet" href="preview.css">
<style>
  body { padding: 20px 24px; }
  .row { display: flex; gap: 6px; }
  .sw { flex: 1; min-height: 72px; border-radius: 8px; padding: 8px; display: flex; flex-direction: column; justify-content: space-between; }
  .sw .name { font-size: 11px; font-weight: 600; }
  .sw .hex { font-size: 10px; opacity: 0.75; font-family: ui-monospace, Menlo, monospace; }
  .lead { font-size: 12px; color: #6b7280; margin: 0 0 10px; }
  b { color: #111827; font-weight: 600; }
</style>
</head>
<body>
  <p class="lead"><b>Gray</b> — the entire workhorse neutral scale. No warm/cool variants.</p>
  <div class="row">
    <div class="sw" style="background:#f9fafb;color:#111827;border:1px solid #e5e7eb;"><span class="name">50 · page bg</span><span class="hex">#F9FAFB</span></div>
    <div class="sw" style="background:#f3f4f6;color:#111827;"><span class="name">100</span><span class="hex">#F3F4F6</span></div>
    <div class="sw" style="background:#e5e7eb;color:#111827;"><span class="name">200 · border</span><span class="hex">#E5E7EB</span></div>
    <div class="sw" style="background:#d1d5db;color:#111827;"><span class="name">300 · input</span><span class="hex">#D1D5DB</span></div>
    <div class="sw" style="background:#9ca3af;color:#fff;"><span class="name">400</span><span class="hex">#9CA3AF</span></div>
    <div class="sw" style="background:#6b7280;color:#fff;"><span class="name">500 · muted</span><span class="hex">#6B7280</span></div>
    <div class="sw" style="background:#4b5563;color:#fff;"><span class="name">600 · body</span><span class="hex">#4B5563</span></div>
    <div class="sw" style="background:#374151;color:#fff;"><span class="name">700 · label</span><span class="hex">#374151</span></div>
    <div class="sw" style="background:#1f2937;color:#fff;"><span class="name">800</span><span class="hex">#1F2937</span></div>
    <div class="sw" style="background:#111827;color:#fff;"><span class="name">900 · fg</span><span class="hex">#111827</span></div>
  </div>
</body>
</html>
