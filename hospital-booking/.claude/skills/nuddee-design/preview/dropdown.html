<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Dropdown menu</title>
<link rel="stylesheet" href="preview.css">
<style>
  body { padding: 18px 24px; font-family: 'Sarabun', sans-serif; background: #f9fafb; }
  .menu { background: #fff; border-radius: 8px; box-shadow: 0 10px 15px -3px rgba(0,0,0,.1),0 4px 6px -4px rgba(0,0,0,.1); width: 260px; padding: 4px 0; }
  .head { padding: 10px 16px; border-bottom: 1px solid #e5e7eb; }
  .head .n { font-size: 14px; font-weight: 500; color: #111827; }
  .head .e { font-size: 12px; color: #6b7280; }
  .item { display: flex; align-items: center; gap: 10px; padding: 8px 16px; font-size: 14px; color: #374151; cursor: pointer; }
  .item .emoji { width: 16px; text-align: center; }
  .item svg { width: 16px; height: 16px; stroke-width: 2; flex-shrink: 0; }
  .item:hover { background: #f3f4f6; }
  .sep { border-top: 1px solid #e5e7eb; margin-top: 4px; padding-top: 4px; }
  .danger { color: #dc2626; }
  .danger:hover { background: #fef2f2; }
</style>
</head>
<body>
  <div class="menu">
    <div class="head"><div class="n">นพ. สมชาย ใจดี</div><div class="e">somchai@humnoi.nuddee.com</div></div>
    <a class="item"><span class="emoji">🏠</span> หน้าหลัก</a>
    <a class="item"><span class="emoji">👤</span> โปรไฟล์</a>
    <a class="item"><span class="emoji">🕐</span> ตั้งค่าเวลาทำการ</a>
    <a class="item"><span class="emoji">📅</span> ประเภทการนัดหมาย</a>
    <a class="item"><span class="emoji">👥</span> จัดการผู้ให้บริการ</a>
    <div class="sep"><a class="item" style="color:#9333ea;"><span class="emoji">🔗</span> หน้าจองสาธารณะ</a></div>
    <div class="sep"><a class="item danger"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6A2.25 2.25 0 0 0 5.25 5.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15M12 9l3 3m0 0l-3 3m3-3H2.25"/></svg> ออกจากระบบ</a></div>
  </div>
</body>
</html>
