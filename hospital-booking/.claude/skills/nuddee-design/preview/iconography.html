<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Iconography</title>
<link rel="stylesheet" href="preview.css">
<style>
  body { padding: 18px 24px; font-family: 'Sarabun', sans-serif; }
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px 10px; margin-bottom: 14px; }
  .ico { display: flex; flex-direction: column; align-items: center; gap: 5px; font-size: 10px; color: #6b7280; text-align: center; }
  .ico svg { width: 22px; height: 22px; stroke-width: 2; color: #4b5563; }
  .group-title { font-size: 11px; color: #6b7280; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
  .emo { display: flex; gap: 14px; font-size: 20px; flex-wrap: wrap; }
  .emo span { display: inline-flex; flex-direction: column; align-items: center; gap: 2px; font-size: 18px; color: #111827; }
  .emo span i { font-style: normal; font-size: 10px; color: #6b7280; font-family: ui-monospace, Menlo, monospace; }
</style>
</head>
<body>
  <div class="group-title">Heroicons · outline · stroke-2</div>
  <div class="grid">
    <div class="ico"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>calendar</div>
    <div class="ico"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>clock</div>
    <div class="ico"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>device-mobile</div>
    <div class="ico"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>chart-bar</div>
    <div class="ico"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>info-circle</div>
    <div class="ico"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>search</div>
    <div class="ico"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>chevron-left</div>
    <div class="ico"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>chevron-right</div>
    <div class="ico"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>chevron-down</div>
    <div class="ico"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>x-mark</div>
    <div class="ico"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>check-circle</div>
    <div class="ico"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6A2.25 2.25 0 0 0 5.25 5.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15M12 9l3 3m0 0l-3 3m3-3H2.25"/></svg>logout</div>
    <div class="ico"><svg fill="currentColor" viewBox="0 0 20 20" style="color:#9333ea"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"/></svg>bolt · brand</div>
  </div>
  <div class="group-title">Menu emoji · never invent new ones</div>
  <div class="emo">
    <span>🏥<i>dashboard</i></span>
    <span>👤<i>profile</i></span>
    <span>🕐<i>availability</i></span>
    <span>📅<i>events</i></span>
    <span>👥<i>providers</i></span>
    <span>🔗<i>public link</i></span>
    <span>🎉<i>success</i></span>
    <span>📞<i>call</i></span>
  </div>
</body>
</html>
