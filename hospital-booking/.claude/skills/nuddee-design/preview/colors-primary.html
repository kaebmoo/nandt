<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Primary palette — Purple</title>
<link rel="stylesheet" href="preview.css">
<style>
  body { padding: 20px 24px; }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; aspect-ratio: 1; border-radius: 10px; padding: 10px; display: flex; flex-direction: column; justify-content: space-between; }
  .sw .name { font-size: 12px; font-weight: 600; }
  .sw .hex { font-size: 11px; opacity: 0.8; font-family: ui-monospace, Menlo, monospace; }
  .lead { font-size: 12px; color: #6b7280; margin: 0 0 10px; }
  b { color: #111827; font-weight: 600; }
</style>
</head>
<body>
  <p class="lead"><b>Purple</b> — primary. Used on every CTA, active state, focus ring, and brand mark.</p>
  <div class="row">
    <div class="sw" style="background:#faf5ff;color:#9333ea;"><span class="name">50</span><span class="hex">#FAF5FF</span></div>
    <div class="sw" style="background:#f3e8ff;color:#9333ea;"><span class="name">100</span><span class="hex">#F3E8FF</span></div>
    <div class="sw" style="background:#c084fc;color:#fff;"><span class="name">400</span><span class="hex">#C084FC</span></div>
    <div class="sw" style="background:#a855f7;color:#fff;"><span class="name">500</span><span class="hex">#A855F7</span></div>
    <div class="sw" style="background:#9333ea;color:#fff;outline:2px solid #9333ea;outline-offset:2px;"><span class="name">600 · accent</span><span class="hex">#9333EA</span></div>
    <div class="sw" style="background:#7e22ce;color:#fff;"><span class="name">700 · hover</span><span class="hex">#7E22CE</span></div>
  </div>
</body>
</html>
