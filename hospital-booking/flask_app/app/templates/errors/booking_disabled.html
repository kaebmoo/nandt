{% extends "base.html" %}

{% block title %}ปิดให้บริการจองออนไลน์ - NudDee{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 text-center">
        <div>
            <div class="mx-auto mb-6 flex items-center justify-center w-20 h-20 rounded-full bg-yellow-100">
                <svg class="w-10 h-10 text-yellow-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M9 15l6-6m0 0l-6 6z" transform="translate(-3,-2)"/>
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-gray-900 mb-2">
                ปิดให้บริการจองออนไลน์ชั่วคราว
            </h1>
            <p class="text-sm text-gray-600">
                ขออภัย ปิดให้บริการจองนัดหมายออนไลน์ในขณะนี้
            </p>
        </div>

        <div class="bg-blue-50 border border-blue-200 text-blue-800 px-4 py-3 rounded-lg text-sm">
            กรุณาติดต่อผู้ให้บริการโดยตรงเพื่อนัดหมาย หรือลองอีกครั้งในภายหลัง
        </div>

        <div class="mt-8">
            <a href="javascript:history.back()"
               class="w-full flex justify-center py-2 px-4 border border-gray-300 rounded-lg shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-purple-500">
                ← ย้อนกลับ
            </a>
        </div>
    </div>
</div>
{% endblock %}
