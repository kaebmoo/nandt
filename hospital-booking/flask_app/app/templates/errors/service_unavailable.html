{% extends "base.html" %}

{% block title %}ปิดให้บริการชั่วคราว - NudDee{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 text-center">
        <div>
            <div class="mx-auto mb-6 flex items-center justify-center w-20 h-20 rounded-full bg-yellow-100">
                <svg class="w-10 h-10 text-yellow-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-gray-900 mb-2">
                ปิดให้บริการชั่วคราว
            </h1>
            <p class="text-sm text-gray-600">
                ขออภัย มีการปิดให้บริการในขณะนี้
            </p>
        </div>

        <div class="bg-yellow-50 border border-yellow-200 text-yellow-800 px-4 py-3 rounded-lg text-sm">
            กรุณาลองอีกครั้งในภายหลัง หรือติดต่อผู้ให้บริการโดยตรง
        </div>

        <div class="mt-8">
            <a href="javascript:history.back()"
               class="w-full flex justify-center py-2 px-4 border border-gray-300 rounded-lg shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-purple-500">
                ← ย้อนกลับ
            </a>
        </div>
    </div>
</div>
{% endblock %}
